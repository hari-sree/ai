# Exposes non-k8s host services on Sparta (192.168.1.3) via Traefik ingress.
# Each service has: Service (no selector) + Endpoints (manual, host IP) + Ingress (host routing).

---
# ── Ollama (LLM inference, port 11434) ──────────────────────────────────────

apiVersion: v1
kind: Service
metadata:
  name: ollama-host
  namespace: default
spec:
  ports:
  - name: http
    port: 11434
    targetPort: 11434
    protocol: TCP

---
apiVersion: v1
kind: Endpoints
metadata:
  name: ollama-host
  namespace: default
subsets:
- addresses:
  - ip: 192.168.1.3
  ports:
  - name: http
    port: 11434
    protocol: TCP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ollama-ingress
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
  - host: ollama.sparta.home
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ollama-host
            port:
              number: 11434

